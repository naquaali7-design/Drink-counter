<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soda Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --accent: #4f8ef7;
      --accent-dim: #2a3f6e;
      --danger: #e05252;
      --success: #4eca8b;
      --warning: #f0a843;
      --text: #e8eaf0;
      --muted: #7a7f9a;
      --border: #2e3248;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--muted);
      margin-top: 4px;
      font-size: 0.95rem;
    }

    .week-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .main { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }

    /* --- Goal bar --- */
    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .goal-header span { font-weight: 600; font-size: 0.95rem; }

    .goal-edit { display: flex; align-items: center; gap: 8px; }

    .goal-edit input {
      width: 56px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.9rem;
      text-align: center;
    }

    .goal-edit label { color: var(--muted); font-size: 0.85rem; }

    .progress-bar {
      height: 10px;
      background: var(--card);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease, background 0.3s;
    }

    .progress-fill.ok    { background: var(--success); }
    .progress-fill.warn  { background: var(--warning); }
    .progress-fill.over  { background: var(--danger); }

    .progress-text {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* --- Big log button --- */
    .log-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 1.15rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .log-btn:hover  { background: #6aa0ff; }
    .log-btn:active { transform: scale(0.97); }

    .log-btn .icon { font-size: 1.4rem; }

    /* --- Daily bars --- */
    .days-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .days-card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .day-rows { display: flex; flex-direction: column; gap: 10px; }

    .day-row {
      display: grid;
      grid-template-columns: 38px 1fr 32px;
      align-items: center;
      gap: 10px;
    }

    .day-name {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }

    .day-name.today { color: var(--accent); font-weight: 700; }

    .day-bar-wrap {
      height: 8px;
      background: var(--card);
      border-radius: 99px;
      overflow: hidden;
    }

    .day-bar {
      height: 100%;
      border-radius: 99px;
      background: var(--accent-dim);
      transition: width 0.4s ease;
      min-width: 0;
    }

    .day-bar.today-bar { background: var(--accent); }

    .day-count {
      font-size: 0.85rem;
      font-weight: 600;
      text-align: right;
      color: var(--text);
    }

    /* --- Today detail --- */
    .today-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .today-card h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .entries-list { display: flex; flex-direction: column; gap: 6px; }

    .entry-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.9rem;
    }

    .entry-time { color: var(--muted); font-size: 0.82rem; }

    .remove-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .remove-btn:hover { opacity: 1; }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 10px 0;
    }

    /* --- Stats --- */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .stat-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-top: 4px;
    }

    /* streak colors */
    .streak-0  { color: var(--muted); }
    .streak-lo { color: var(--success); }
    .streak-hi { color: var(--warning); }
  </style>
</head>
<body>

<header>
  <h1>🥤 Soda Tracker</h1>
  <p>Track it to crack it.</p>
  <div class="week-label" id="weekLabel"></div>
</header>

<div class="main">

  <!-- Goal progress -->
  <div class="goal-card">
    <div class="goal-header">
      <span>Weekly goal</span>
      <div class="goal-edit">
        <input type="number" id="goalInput" min="1" max="99" value="14" />
        <label for="goalInput">sodas / week</label>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text">
      <span id="progressLeft"></span>
      <span id="progressCount"></span>
    </div>
  </div>

  <!-- Log button -->
  <button class="log-btn" id="logBtn">
    <span class="icon">+</span> Log a soda
  </button>

  <!-- Stats row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statToday">0</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statWeek">0</div>
      <div class="stat-label">This week</div>
    </div>
    <div class="stat-card">
      <div class="stat-value streak-0" id="statStreak">0</div>
      <div class="stat-label">Day streak</div>
    </div>
  </div>

  <!-- Weekly bar chart -->
  <div class="days-card">
    <h2>This week</h2>
    <div class="day-rows" id="dayRows"></div>
  </div>

  <!-- Today's entries -->
  <div class="today-card">
    <h2>Today's sodas</h2>
    <div class="entries-list" id="entriesList"></div>
  </div>

</div>

<script>
  // ── Storage helpers ──────────────────────────────────────────────────
  const STORAGE_KEY = 'soda-tracker-v1';
  const GOAL_KEY    = 'soda-tracker-goal';

  function loadData() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveData(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function loadGoal() {
    return parseInt(localStorage.getItem(GOAL_KEY) || '14', 10);
  }

  function saveGoal(g) {
    localStorage.setItem(GOAL_KEY, String(g));
  }

  // ── Date helpers ─────────────────────────────────────────────────────
  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function weekStart(date) {
    // Week starts on Monday
    const d = new Date(date);
    const day = d.getDay(); // 0=Sun
    const diff = (day === 0) ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function weekDates() {
    const ws = weekStart(new Date());
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(ws);
      d.setDate(d.getDate() + i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return { date: ds, dayName: DAY_NAMES[d.getDay()] };
    });
  }

  function formatTime(iso) {
    const d = new Date(iso);
    const h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
    const ampm = h >= 12 ? 'pm' : 'am';
    return `${h % 12 || 12}:${m} ${ampm}`;
  }

  function weekRange() {
    const days = weekDates();
    const fmt = d => { const [,mo,dy] = d.split('-'); return `${+mo}/${+dy}`; };
    return `${fmt(days[0].date)} – ${fmt(days[6].date)}`;
  }

  // ── State ────────────────────────────────────────────────────────────
  let entries = loadData();
  let goal    = loadGoal();

  // ── Render ───────────────────────────────────────────────────────────
  function render() {
    const today = todayStr();
    const days  = weekDates();

    // counts
    const countByDay = {};
    days.forEach(d => { countByDay[d.date] = 0; });
    entries.forEach(e => { if (countByDay[e.date] !== undefined) countByDay[e.date]++; });

    const weekTotal = Object.values(countByDay).reduce((a, b) => a + b, 0);
    const todayCount = countByDay[today] || 0;

    // week label
    document.getElementById('weekLabel').textContent = `Week of ${weekRange()}`;

    // goal progress
    const pct = Math.min((weekTotal / goal) * 100, 100);
    const fill = document.getElementById('progressFill');
    fill.style.width = pct + '%';
    fill.className = 'progress-fill ' + (pct >= 100 ? 'over' : pct >= 70 ? 'warn' : 'ok');
    const rem = Math.max(goal - weekTotal, 0);
    document.getElementById('progressLeft').textContent =
      weekTotal >= goal ? `${weekTotal - goal} over goal` : `${rem} remaining`;
    document.getElementById('progressCount').textContent = `${weekTotal} / ${goal}`;

    // stats
    document.getElementById('statToday').textContent = todayCount;
    document.getElementById('statWeek').textContent  = weekTotal;

    // streak: consecutive days (going backwards from today) where count ≤ daily budget
    const dailyBudget = goal / 7;
    let streak = 0;
    const sorted = [...days].reverse();
    for (const { date } of sorted) {
      if ((countByDay[date] || 0) <= dailyBudget) streak++;
      else break;
    }
    const streakEl = document.getElementById('statStreak');
    streakEl.textContent = streak;
    streakEl.className = 'stat-value ' + (streak === 0 ? 'streak-0' : streak >= 5 ? 'streak-hi' : 'streak-lo');

    // day bars
    const maxCount = Math.max(...Object.values(countByDay), 1);
    const rowsEl = document.getElementById('dayRows');
    rowsEl.innerHTML = '';
    days.forEach(({ date, dayName }) => {
      const count = countByDay[date] || 0;
      const isToday = date === today;
      const barPct = (count / maxCount) * 100;

      const row = document.createElement('div');
      row.className = 'day-row';
      row.innerHTML = `
        <span class="day-name ${isToday ? 'today' : ''}">${isToday ? '→' : ''} ${dayName}</span>
        <div class="day-bar-wrap">
          <div class="day-bar ${isToday ? 'today-bar' : ''}" style="width:${barPct}%"></div>
        </div>
        <span class="day-count">${count || ''}</span>
      `;
      rowsEl.appendChild(row);
    });

    // today's entries list
    const listEl = document.getElementById('entriesList');
    listEl.innerHTML = '';
    const todayEntries = entries
      .filter(e => e.date === today)
      .sort((a, b) => b.ts - a.ts);

    if (todayEntries.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No sodas logged today — keep it up!</div>';
    } else {
      todayEntries.forEach(e => {
        const item = document.createElement('div');
        item.className = 'entry-item';
        item.innerHTML = `
          <span>🥤 Soda #${todayEntries.indexOf(e) + 1}</span>
          <span class="entry-time">${formatTime(e.iso)}</span>
          <button class="remove-btn" data-id="${e.id}" title="Remove">✕</button>
        `;
        listEl.appendChild(item);
      });
    }
  }

  // ── Actions ──────────────────────────────────────────────────────────
  function logSoda() {
    const now  = new Date();
    const iso  = now.toISOString();
    const date = todayStr();
    const id   = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
    entries.push({ id, date, iso, ts: now.getTime() });
    saveData(entries);
    render();

    // brief button flash
    const btn = document.getElementById('logBtn');
    btn.textContent = '✓ Logged!';
    btn.style.background = '#4eca8b';
    setTimeout(() => {
      btn.innerHTML = '<span class="icon">+</span> Log a soda';
      btn.style.background = '';
    }, 800);
  }

  function removeEntry(id) {
    entries = entries.filter(e => e.id !== id);
    saveData(entries);
    render();
  }

  // ── Event listeners ──────────────────────────────────────────────────
  document.getElementById('logBtn').addEventListener('click', logSoda);

  document.getElementById('entriesList').addEventListener('click', e => {
    const btn = e.target.closest('.remove-btn');
    if (btn) removeEntry(btn.dataset.id);
  });

  const goalInput = document.getElementById('goalInput');
  goalInput.value = goal;
  goalInput.addEventListener('change', () => {
    const v = parseInt(goalInput.value, 10);
    if (!isNaN(v) && v >= 1) {
      goal = v;
      saveGoal(goal);
      render();
    }
  });

  // ── Init ─────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
