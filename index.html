<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soda Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --card: #22263a;
      --accent: #4f8ef7;
      --accent-dim: #2a3f6e;
      --danger: #e05252;
      --success: #4eca8b;
      --warning: #f0a843;
      --text: #e8eaf0;
      --muted: #7a7f9a;
      --border: #2e3248;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 24px 16px 60px;
    }

    header {
      width: 100%; max-width: 480px;
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 28px;
    }
    .header-text h1  { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    .header-text p   { color: var(--muted); margin-top: 4px; font-size: 0.95rem; }
    .week-label      { font-size: 0.8rem; color: var(--muted); margin-top: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
    .header-actions  { display: flex; gap: 8px; padding-top: 6px; }

    .icon-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      border-radius: 10px; width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.1rem;
      transition: color 0.15s, border-color 0.15s; position: relative;
    }
    .icon-btn:hover { color: var(--text); border-color: var(--accent); }

    .sync-dot {
      position: absolute; top: 6px; right: 6px;
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
    }
    .sync-dot.ok      { background: var(--success); }
    .sync-dot.syncing { background: var(--warning); animation: pulse 1s infinite; }
    .sync-dot.error   { background: var(--danger); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

    .main { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }

    .goal-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
    .goal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .goal-header span { font-weight:600; font-size:0.95rem; }
    .goal-edit { display:flex; align-items:center; gap:8px; }
    .goal-edit input { width:56px; background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:8px; padding:4px 8px; font-size:0.9rem; text-align:center; }
    .goal-edit label { color:var(--muted); font-size:0.85rem; }
    .progress-bar  { height:10px; background:var(--card); border-radius:99px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:99px; transition:width 0.4s ease,background 0.3s; }
    .progress-fill.ok   { background:var(--success); }
    .progress-fill.warn { background:var(--warning); }
    .progress-fill.over { background:var(--danger); }
    .progress-text { display:flex; justify-content:space-between; margin-top:6px; font-size:0.8rem; color:var(--muted); }

    .log-btn {
      display:flex; align-items:center; justify-content:center; gap:10px;
      width:100%; padding:20px; background:var(--accent); color:#fff;
      border:none; border-radius:var(--radius); font-size:1.15rem; font-weight:700;
      cursor:pointer; transition:background 0.15s,transform 0.1s;
    }
    .log-btn:hover  { background:#6aa0ff; }
    .log-btn:active { transform:scale(0.97); }

    .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; text-align:center; }
    .stat-value { font-size:1.8rem; font-weight:700; line-height:1.1; }
    .stat-label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.4px; margin-top:4px; }
    .streak-0  { color:var(--muted); }
    .streak-lo { color:var(--success); }
    .streak-hi { color:var(--warning); }

    .days-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
    .days-card h2 { font-size:0.85rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-bottom:14px; }
    .day-rows { display:flex; flex-direction:column; gap:10px; }
    .day-row { display:grid; grid-template-columns:38px 1fr 32px; align-items:center; gap:10px; }
    .day-name { font-size:0.85rem; color:var(--muted); font-weight:500; }
    .day-name.today { color:var(--accent); font-weight:700; }
    .day-bar-wrap { height:8px; background:var(--card); border-radius:99px; overflow:hidden; }
    .day-bar { height:100%; border-radius:99px; background:var(--accent-dim); transition:width 0.4s ease; }
    .day-bar.today-bar { background:var(--accent); }
    .day-count { font-size:0.85rem; font-weight:600; text-align:right; }

    .today-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; }
    .today-card h2 { font-size:0.85rem; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); margin-bottom:14px; }
    .entries-list { display:flex; flex-direction:column; gap:6px; }
    .entry-item { display:flex; align-items:center; justify-content:space-between; background:var(--card); border-radius:10px; padding:10px 14px; font-size:0.9rem; }
    .entry-time { color:var(--muted); font-size:0.82rem; }
    .remove-btn { background:none; border:none; color:var(--danger); cursor:pointer; font-size:1rem; padding:0 4px; opacity:0.7; transition:opacity 0.15s; }
    .remove-btn:hover { opacity:1; }
    .empty-state { text-align:center; color:var(--muted); font-size:0.9rem; padding:10px 0; }

    /* Modal */
    .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:center; justify-content:center; padding:20px; }
    .overlay.open { display:flex; }
    .modal {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      width:100%; max-width:420px; padding:24px; display:flex; flex-direction:column; gap:16px;
    }
    .modal-header { display:flex; justify-content:space-between; align-items:center; }
    .modal-header h2 { font-size:1.1rem; font-weight:700; }
    .close-btn { background:none; border:none; color:var(--muted); font-size:1.3rem; cursor:pointer; }
    .close-btn:hover { color:var(--text); }

    .status-badge { display:flex; align-items:center; gap:8px; background:var(--card); border-radius:10px; padding:12px 14px; font-size:0.875rem; }
    .badge-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .badge-dot.ok      { background:var(--success); }
    .badge-dot.syncing { background:var(--warning); animation:pulse 1s infinite; }
    .badge-dot.error   { background:var(--danger); }

    .code-card {
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .code-label { font-size: 0.75rem; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .code-value {
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 1.5rem; font-weight: 700; letter-spacing: 4px;
      color: var(--text);
    }
    .code-hint { font-size: 0.78rem; color: var(--muted); }

    .field-group { display:flex; flex-direction:column; gap:8px; }
    .field-group label { font-size:0.82rem; color:var(--muted); font-weight:500; }
    .field-row { display:flex; gap:8px; }
    .field-group input {
      background:var(--card); border:1px solid var(--border); color:var(--text);
      border-radius:8px; padding:10px 12px; font-size:0.9rem; flex:1; min-width:0;
    }
    .field-group input:focus { outline:none; border-color:var(--accent); }

    .action-btn {
      width:100%; padding:12px; background:var(--accent); color:#fff;
      border:none; border-radius:10px; font-size:0.9rem; font-weight:700;
      cursor:pointer; transition:background 0.15s;
    }
    .action-btn:hover { background:#6aa0ff; }
    .action-btn:disabled { opacity:0.5; cursor:default; }
    .action-btn.secondary { background:var(--card); color:var(--text); border:1px solid var(--border); }
    .action-btn.secondary:hover { border-color:var(--accent); background:var(--card); }

    .copy-btn { flex-shrink:0; background:var(--card); border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:10px 14px; font-size:0.82rem; cursor:pointer; white-space:nowrap; transition:color 0.15s,border-color 0.15s; }
    .copy-btn:hover { color:var(--text); border-color:var(--accent); }

    .divider { border:none; border-top:1px solid var(--border); }
    .error-msg { color:var(--danger); font-size:0.82rem; }

    /* Switch-code panel */
    #switchPanel { display:none; flex-direction:column; gap:12px; }
    #switchPanel.open { display:flex; }
  </style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>🥤 Soda Tracker</h1>
    <p>Track it to crack it.</p>
    <div class="week-label" id="weekLabel"></div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="syncBtn" title="Sync">
      ☁<span class="sync-dot" id="syncDot"></span>
    </button>
  </div>
</header>

<div class="main">
  <div class="goal-card">
    <div class="goal-header">
      <span>Weekly goal</span>
      <div class="goal-edit">
        <input type="number" id="goalInput" min="1" max="99" value="14" />
        <label for="goalInput">sodas / week</label>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text"><span id="progressLeft"></span><span id="progressCount"></span></div>
  </div>

  <button class="log-btn" id="logBtn"><span>+</span> Log a soda</button>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="statToday">0</div><div class="stat-label">Today</div></div>
    <div class="stat-card"><div class="stat-value" id="statWeek">0</div><div class="stat-label">This week</div></div>
    <div class="stat-card"><div class="stat-value streak-0" id="statStreak">0</div><div class="stat-label">Day streak</div></div>
  </div>

  <div class="days-card">
    <h2>This week</h2>
    <div class="day-rows" id="dayRows"></div>
  </div>

  <div class="today-card">
    <h2>Today's sodas</h2>
    <div class="entries-list" id="entriesList"></div>
  </div>
</div>

<!-- Sync modal -->
<div class="overlay" id="syncOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>☁ Sync</h2>
      <button class="close-btn" id="closeModal">✕</button>
    </div>

    <div class="status-badge">
      <span class="badge-dot" id="modalDot"></span>
      <span id="modalStatus">Connecting…</span>
    </div>

    <!-- Sync code display -->
    <div class="code-card">
      <div class="code-label">Your sync code</div>
      <div class="code-value" id="codeDisplay">——————</div>
      <div class="code-hint">Enter this code on your other devices to sync your data.</div>
    </div>

    <div class="field-row">
      <button class="action-btn" id="copyCodeBtn">Copy code</button>
      <button class="action-btn secondary" id="switchCodeBtn">Use a different code</button>
    </div>

    <!-- Switch-code panel -->
    <div id="switchPanel">
      <hr class="divider" />
      <p style="font-size:0.85rem;color:var(--muted);">Enter the sync code from your other device to merge data.</p>
      <div class="field-group">
        <div class="field-row">
          <input type="text" id="newCodeInput" placeholder="e.g. A1B2C3D4E5F6" style="text-transform:uppercase;font-family:monospace;letter-spacing:2px;" maxlength="12" />
        </div>
      </div>
      <div id="switchError" class="error-msg" style="display:none;"></div>
      <button class="action-btn" id="applyCodeBtn">Switch &amp; Sync</button>
    </div>
  </div>
</div>

<script>
// ── Firebase config (embedded) ────────────────────────────────────────
const FB_API_KEY    = 'AIzaSyDvGABAnXxQ5nhXc3XwxCU2UkxGuDCIliY';
const FB_PROJECT_ID = 'soda-tracker-5a705';

// ── Storage ───────────────────────────────────────────────────────────
const STORAGE_KEY  = 'soda-tracker-v1';
const GOAL_KEY     = 'soda-tracker-goal';
const SYNC_CODE_KEY = 'soda-sync-code';

const loadLocal    = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } };
const saveLocal    = e  => localStorage.setItem(STORAGE_KEY, JSON.stringify(e));
const loadGoal     = () => parseInt(localStorage.getItem(GOAL_KEY) || '14', 10);
const saveGoal     = g  => localStorage.setItem(GOAL_KEY, String(g));
const loadSyncCode = () => localStorage.getItem(SYNC_CODE_KEY);
const saveSyncCode = c  => localStorage.setItem(SYNC_CODE_KEY, c);

function getOrCreateSyncCode() {
  let code = loadSyncCode();
  if (!code) {
    code = Array.from(crypto.getRandomValues(new Uint8Array(6)))
      .map(b => b.toString(16).padStart(2,'0')).join('').slice(0,12).toUpperCase();
    saveSyncCode(code);
  }
  return code;
}

// ── Firestore REST ────────────────────────────────────────────────────
const FS_BASE = 'https://firestore.googleapis.com/v1';

function colURL(syncCode) {
  return `${FS_BASE}/projects/${FB_PROJECT_ID}/databases/(default)/documents/soda/${syncCode}/entries`;
}

function toFS(e) {
  return { fields: { id:{stringValue:e.id}, date:{stringValue:e.date}, iso:{stringValue:e.iso}, ts:{integerValue:String(e.ts)} } };
}

function fromFS(doc) {
  const f = doc.fields;
  return { id:f.id.stringValue, date:f.date.stringValue, iso:f.iso.stringValue, ts:parseInt(f.ts.integerValue,10) };
}

async function fsFetch(syncCode) {
  const r = await fetch(`${colURL(syncCode)}?key=${FB_API_KEY}`);
  if (!r.ok) throw new Error(`Firestore ${r.status}`);
  const d = await r.json();
  return d.documents ? d.documents.map(fromFS) : [];
}

async function fsWrite(syncCode, entry) {
  const r = await fetch(`${colURL(syncCode)}/${entry.id}?key=${FB_API_KEY}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify(toFS(entry)),
  });
  if (!r.ok) throw new Error(`Firestore write ${r.status}`);
}

async function fsDelete(syncCode, id) {
  const r = await fetch(`${colURL(syncCode)}/${id}?key=${FB_API_KEY}`, { method: 'DELETE' });
  if (!r.ok) throw new Error(`Firestore delete ${r.status}`);
}

// ── Sync ──────────────────────────────────────────────────────────────
let syncStatus = 'syncing';

function setSyncStatus(s, msg) {
  syncStatus = s;
  document.getElementById('syncDot').className = 'sync-dot ' + s;
  const dot = document.getElementById('modalDot');
  if (dot) dot.className = 'badge-dot ' + s;
  const statusEl = document.getElementById('modalStatus');
  if (statusEl && msg) statusEl.textContent = msg;
}

function mergeEntries(a, b) {
  const map = new Map();
  [...a, ...b].forEach(e => map.set(e.id, e));
  return [...map.values()];
}

async function syncDown() {
  const code = loadSyncCode();
  if (!code) return;
  setSyncStatus('syncing', 'Syncing…');
  try {
    const remote = await fsFetch(code);
    entries = mergeEntries(loadLocal(), remote);
    saveLocal(entries);
    setSyncStatus('ok', 'Synced');
    render();
  } catch (e) {
    setSyncStatus('error', 'Sync error — check your connection');
  }
}

// ── State ─────────────────────────────────────────────────────────────
let entries = loadLocal();
let goal    = loadGoal();

// ── Render ────────────────────────────────────────────────────────────
const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function weekDates() {
  const d = new Date(), day = d.getDay();
  const ws = new Date(d);
  ws.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  ws.setHours(0,0,0,0);
  return Array.from({ length: 7 }, (_, i) => {
    const dd = new Date(ws); dd.setDate(ws.getDate() + i);
    const ds = `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,'0')}-${String(dd.getDate()).padStart(2,'0')}`;
    return { date: ds, dayName: DAY_NAMES[dd.getDay()] };
  });
}

function formatTime(iso) {
  const d = new Date(iso), h = d.getHours(), m = String(d.getMinutes()).padStart(2,'0');
  return `${h % 12 || 12}:${m} ${h >= 12 ? 'pm' : 'am'}`;
}

function weekRange() {
  const days = weekDates();
  const fmt  = ds => { const [,mo,dy] = ds.split('-'); return `${+mo}/${+dy}`; };
  return `${fmt(days[0].date)} – ${fmt(days[6].date)}`;
}

function render() {
  const today = todayStr(), days = weekDates();
  const countByDay = {};
  days.forEach(d => { countByDay[d.date] = 0; });
  entries.forEach(e => { if (countByDay[e.date] !== undefined) countByDay[e.date]++; });

  const weekTotal  = Object.values(countByDay).reduce((a,b) => a+b, 0);
  const todayCount = countByDay[today] || 0;

  document.getElementById('weekLabel').textContent = `Week of ${weekRange()}`;

  const pct  = Math.min((weekTotal / goal) * 100, 100);
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  fill.className   = 'progress-fill ' + (pct >= 100 ? 'over' : pct >= 70 ? 'warn' : 'ok');
  document.getElementById('progressLeft').textContent =
    weekTotal >= goal ? `${weekTotal - goal} over goal` : `${Math.max(goal - weekTotal, 0)} remaining`;
  document.getElementById('progressCount').textContent = `${weekTotal} / ${goal}`;

  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statWeek').textContent  = weekTotal;

  let streak = 0;
  const budget = goal / 7;
  for (const { date } of [...days].reverse()) {
    if ((countByDay[date] || 0) <= budget) streak++; else break;
  }
  const streakEl = document.getElementById('statStreak');
  streakEl.textContent = streak;
  streakEl.className   = 'stat-value ' + (streak === 0 ? 'streak-0' : streak >= 5 ? 'streak-hi' : 'streak-lo');

  const maxCount = Math.max(...Object.values(countByDay), 1);
  const rowsEl   = document.getElementById('dayRows');
  rowsEl.innerHTML = '';
  days.forEach(({ date, dayName }) => {
    const count = countByDay[date] || 0, isToday = date === today;
    const row   = document.createElement('div');
    row.className = 'day-row';
    row.innerHTML = `
      <span class="day-name ${isToday ? 'today' : ''}">${isToday ? '→' : ''} ${dayName}</span>
      <div class="day-bar-wrap"><div class="day-bar ${isToday ? 'today-bar' : ''}" style="width:${(count/maxCount)*100}%"></div></div>
      <span class="day-count">${count || ''}</span>`;
    rowsEl.appendChild(row);
  });

  const listEl       = document.getElementById('entriesList');
  listEl.innerHTML   = '';
  const todayEntries = entries.filter(e => e.date === today).sort((a,b) => b.ts - a.ts);
  if (!todayEntries.length) {
    listEl.innerHTML = '<div class="empty-state">No sodas logged today — keep it up!</div>';
  } else {
    todayEntries.forEach((e, i) => {
      const item = document.createElement('div');
      item.className = 'entry-item';
      item.innerHTML = `
        <span>🥤 Soda #${todayEntries.length - i}</span>
        <span class="entry-time">${formatTime(e.iso)}</span>
        <button class="remove-btn" data-id="${e.id}">✕</button>`;
      listEl.appendChild(item);
    });
  }
}

// ── Actions ───────────────────────────────────────────────────────────
async function logSoda() {
  const now   = new Date();
  const entry = { id:`${Date.now()}-${Math.random().toString(36).slice(2)}`, date:todayStr(), iso:now.toISOString(), ts:now.getTime() };
  entries.push(entry);
  saveLocal(entries);
  render();

  const btn = document.getElementById('logBtn');
  btn.innerHTML = '✓ Logged!'; btn.style.background = '#4eca8b';
  setTimeout(() => { btn.innerHTML = '<span>+</span> Log a soda'; btn.style.background = ''; }, 800);

  const code = loadSyncCode();
  if (code) { setSyncStatus('syncing'); try { await fsWrite(code, entry); setSyncStatus('ok','Synced'); } catch { setSyncStatus('error','Sync error'); } }
}

async function removeEntry(id) {
  entries = entries.filter(e => e.id !== id);
  saveLocal(entries);
  render();
  const code = loadSyncCode();
  if (code) { setSyncStatus('syncing'); try { await fsDelete(code, id); setSyncStatus('ok','Synced'); } catch { setSyncStatus('error','Sync error'); } }
}

// ── Modal ─────────────────────────────────────────────────────────────
function openSyncModal() {
  const code = loadSyncCode() || getOrCreateSyncCode();
  document.getElementById('codeDisplay').textContent = code;
  document.getElementById('switchPanel').classList.remove('open');
  document.getElementById('newCodeInput').value = '';
  document.getElementById('switchError').style.display = 'none';

  const dot = document.getElementById('modalDot');
  dot.className = 'badge-dot ' + syncStatus;
  const statusEl = document.getElementById('modalStatus');
  statusEl.textContent = syncStatus === 'ok' ? 'Synced' : syncStatus === 'syncing' ? 'Syncing…' : 'Sync error — check connection';

  document.getElementById('syncOverlay').classList.add('open');
}

function closeSyncModal() { document.getElementById('syncOverlay').classList.remove('open'); }

async function applyNewCode() {
  const raw = document.getElementById('newCodeInput').value.trim().toUpperCase();
  const err = document.getElementById('switchError');
  err.style.display = 'none';
  if (!raw) { err.textContent = 'Enter a sync code.'; err.style.display = 'block'; return; }

  const btn = document.getElementById('applyCodeBtn');
  btn.textContent = 'Switching…'; btn.disabled = true;

  try {
    const remote = await fsFetch(raw);
    // push local entries to new code's namespace
    for (const e of entries) await fsWrite(raw, e);
    entries = mergeEntries(entries, remote);
    saveLocal(entries);
    saveSyncCode(raw);
    setSyncStatus('ok', 'Synced');
    render();
    document.getElementById('codeDisplay').textContent = raw;
    document.getElementById('switchPanel').classList.remove('open');
  } catch (e) {
    err.textContent = `Failed: ${e.message}`;
    err.style.display = 'block';
  } finally {
    btn.textContent = 'Switch & Sync'; btn.disabled = false;
  }
}

async function copyText(text, btn) {
  try { await navigator.clipboard.writeText(text); const o=btn.textContent; btn.textContent='Copied!'; setTimeout(()=>btn.textContent=o,1500); } catch {}
}

// ── Events ────────────────────────────────────────────────────────────
document.getElementById('logBtn').addEventListener('click', logSoda);
document.getElementById('syncBtn').addEventListener('click', openSyncModal);
document.getElementById('closeModal').addEventListener('click', closeSyncModal);
document.getElementById('syncOverlay').addEventListener('click', e => { if (e.target===document.getElementById('syncOverlay')) closeSyncModal(); });
document.getElementById('entriesList').addEventListener('click', e => { const b=e.target.closest('.remove-btn'); if(b) removeEntry(b.dataset.id); });
document.getElementById('copyCodeBtn').addEventListener('click', () => copyText(loadSyncCode(), document.getElementById('copyCodeBtn')));
document.getElementById('switchCodeBtn').addEventListener('click', () => document.getElementById('switchPanel').classList.toggle('open'));
document.getElementById('applyCodeBtn').addEventListener('click', applyNewCode);

const goalInput = document.getElementById('goalInput');
goalInput.value = goal;
goalInput.addEventListener('change', () => { const v=parseInt(goalInput.value,10); if(!isNaN(v)&&v>=1){goal=v;saveGoal(goal);render();} });

// ── Init ──────────────────────────────────────────────────────────────
getOrCreateSyncCode();
render();
setSyncStatus('syncing', 'Syncing…');
syncDown();
setInterval(syncDown, 60_000);
</script>
</body>
</html>
